<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Finance AI Dashboard</h1>

    <div class="summary">

        <div class="card">
            <h3>Total Spending</h3>
            <p id="total-spending">₹0</p>
        </div>

        <div class="card">
            <h3>Transactions</h3>
            <p id="transactions">0</p>
        </div>

        <div class="card">
            <h3>Average Expense</h3>
            <p id="average-expense">₹0</p>
        </div>

    </div>
    <h2>Monthly Report</h2>

        <input type="month" id="month-select">

        <!-- <button onclick="loadData()">
            Load Report
        </button> -->

    <h2>Expenses</h2>

    <table>
        <thead>
            <tr>
                <th>Merchant</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Category</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="expense-table">
        </tbody>
    </table>
    <h2>Add Expense</h2>

<form id="expense-form">

    <input
        type="text"
        id="merchant"
        placeholder="Merchant"
        required
    >

    <input
        type="number"
        id="amount"
        placeholder="Amount"
        required
    >
    

    <input
        type="date"
        id="date"
        required
    >

    <select id="category" required>
        <option value="">Select Category</option>
        <option value="Food">🍕 Food</option>
        <option value="Shopping">🛍️ Shopping</option>
        <option value="Transport">🚌 Transport</option>
        <option value="Bills">💡 Bills</option>
        <option value="Entertainment">🎬 Entertainment</option>
        <option value="Health">🏥 Health</option>
        <option value="Education">📚 Education</option>
        <option value="Other">📦 Other</option>
    </select>

    <button type="submit">
        Add Expense
    </button>

    <!-- <textarea
    id="note"
    placeholder="What was this expense for? (optional)"
    rows="3">
    </textarea> -->

</form>

    <h3>Filter by Category</h3>

        <select id="category-filter">
            <option value="">Select</option>
            <option value="Food">Food</option>
            <option value="Shopping">Shopping</option>
            <option value="Travel">Travel</option>
            <option value="Bills">Bills</option>
            <option value="Entertainment">Entertainment</option>
    </select>
    <h3>Category Expenses</h3>

    <h4 id="category-total">
        Total: ₹0
    </h4>
    <h4 id="category-transactions">
        Transactions: 0
    </h4>
    <table>
        <thead>
            <tr>
                <th>Merchant</th>
                <th>Amount</th>
                <th>Date</th>
                <!-- <th>Description</th> -->
            </tr>
        </thead>

        <tbody id="category-table">
        </tbody>
    </table>

    <script src="script.js"></script>

</body>
</html>
